name: CI

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: sdk-go/go.mod
      - name: Test Go SDK
        run: cd sdk-go && go test ./...

  js:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: pnpm
      - name: Install JS dependencies
        run: pnpm -C sdk-js install --frozen-lockfile
      - name: Test JS SDK
        run: pnpm -C sdk-js test
      - name: Build JS SDK
        run: pnpm -C sdk-js run build

  python:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Test Python SDK
        run: cd sdk-python && python3 -m unittest discover -s tests

  php:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.3", "8.4", "8.5"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: "${{ matrix.php-version }}"
          tools: composer
      - name: Install PHP dependencies
        run: composer install
      - name: Test PHP SDK
        run: composer test

  workflows:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.3"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: pnpm
      - name: Install workflow lint dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Lint GitHub Actions workflows
        run: PATH="$(go env GOPATH)/bin:$PATH" actionlint
      - name: Lint Markdown
        run: pnpm exec markdownlint-cli2 '**/*.md' '#node_modules' '#vendor' '#sdk-js/node_modules' '#sdk-php/vendor'
      - name: Check diff whitespace
        run: git diff-tree --check --no-commit-id --root -r HEAD

  publish-js:
    runs-on: self-hosted
    needs: [js]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://verdaccio.k8.haak.co/
      - name: Install JS dependencies
        run: pnpm -C sdk-js install --frozen-lockfile
      - name: Build JS SDK
        run: pnpm -C sdk-js run build
      - name: Publish JS SDK to Verdaccio
        env:
          NODE_AUTH_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
        run: pnpm -C sdk-js publish --no-git-checks --access restricted --ignore-scripts

  publish-packagist:
    runs-on: self-hosted
    needs: [php]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Notify Packagist
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          if [ -z "$PACKAGIST_USERNAME" ] || [ -z "$PACKAGIST_TOKEN" ]; then
            echo "Packagist secrets are not configured; skipping."
            exit 0
          fi
          curl -fsS --config - <<EOF
          request = "POST"
          header = "Content-Type: application/json"
          header = "Authorization: Bearer ${PACKAGIST_USERNAME}:${PACKAGIST_TOKEN}"
          url = "https://packagist.org/api/update-package"
          data = "{\"repository\":{\"url\":\"https://github.com/haakco/custd-sdk\"}}"
          EOF
