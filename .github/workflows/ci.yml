name: CI

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: sdk-go/go.mod
      - name: Vet Go SDK
        run: cd sdk-go && go vet ./...
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Lint Go SDK
        run: cd sdk-go && PATH="$(go env GOPATH)/bin:$PATH" golangci-lint run ./...
      - name: Test Go SDK
        run: cd sdk-go && go test ./...

  js:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: pnpm
      - name: Install JS dependencies
        run: pnpm -C sdk-js install --frozen-lockfile
      - name: Lint JS SDK
        run: pnpm -C sdk-js run lint
      - name: Typecheck JS SDK
        run: pnpm -C sdk-js run typecheck
      - name: Test JS SDK
        run: pnpm -C sdk-js test
      - name: Build JS SDK
        run: pnpm -C sdk-js run build
      - name: Check committed JS dist is current
        run: git diff --exit-code -- sdk-js/dist

  python:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install Python lint tools
        run: python3 -m pip install --quiet ruff==0.9.2 mypy==2.1.0
      - name: Lint Python SDK
        run: cd sdk-python && ruff check
      - name: Typecheck Python SDK
        run: cd sdk-python && mypy
      - name: Test Python SDK
        run: cd sdk-python && python3 -m unittest discover -s tests

  php:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.3", "8.4", "8.5"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: "${{ matrix.php-version }}"
          tools: composer
      - name: Install PHP dependencies
        run: composer install
      - name: Test PHP SDK
        run: composer test

  php-analysis:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: "8.4"
          tools: composer
      - name: Install sdk-php dependencies
        run: cd sdk-php && composer install
      - name: Analyse PHP SDK (PHPStan)
        run: cd sdk-php && composer analyse
      - name: Format-check PHP SDK (Pint)
        run: cd sdk-php && composer format-check

  php-laravel:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: "8.4"
          tools: composer
      - name: Install Laravel package dependencies
        run: cd laravel-package && composer install
      - name: Test Laravel package
        run: cd laravel-package && composer test

  php-wordpress:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: "8.4"
          tools: composer
      - name: Install WordPress package dependencies
        run: cd wordpress-plugin && composer install
      - name: Test WordPress package
        run: cd wordpress-plugin && composer test

  workflows:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.4"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: pnpm
      - name: Install workflow lint dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Lint GitHub Actions workflows
        run: PATH="$(go env GOPATH)/bin:$PATH" actionlint
      - name: Lint Markdown
        run: pnpm exec markdownlint-cli2 '**/*.md' '#node_modules' '#vendor' '#sdk-js/node_modules' '#sdk-php/vendor' '#laravel-package/vendor' '#wordpress-plugin/vendor'
      - name: Check diff whitespace
        run: git diff-tree --check --no-commit-id --root -r HEAD

  release-guard:
    runs-on: self-hosted
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Tag must equal the VERSION source of truth
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$version" ]; then
            echo "Release tag v$tag does not match VERSION ($version)." >&2
            echo "One tag drives one version — bump VERSION and every package manifest together." >&2
            exit 1
          fi
          echo "Release tag v$tag matches VERSION."

  publish-js:
    runs-on: self-hosted
    needs: [js, release-guard]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: pnpm
      - name: Install Infisical CLI
        run: |
          curl -fsSL https://mise.run | sh
          "$HOME/.local/bin/mise" install infisical@0.43.84
          printf '%s\n' "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"
      - name: Install JS dependencies
        run: pnpm -C sdk-js install --frozen-lockfile
      - name: Build JS SDK
        run: pnpm -C sdk-js run build
      # Auth is written to a temporary npm user config so GitHub installs from
      # `path:/sdk-js` never inherit Verdaccio registry settings. The token is
      # pulled from Infisical at runtime (Universal Auth, matching custd/cb).
      - name: Publish JS SDK to Verdaccio
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: |
          # pnpm 10's publish delegates to npm with incompatible args (EUSAGE on
          # npm 11); publish with npm directly using a temporary user config.
          domain="https://secrets.k8.haak.co/api"
          infisical_bin="$("$HOME/.local/bin/mise" which infisical)"
          INFISICAL_TOKEN="$("$infisical_bin" login --method=universal-auth \
            --client-id="$INFISICAL_CLIENT_ID" --client-secret="$INFISICAL_CLIENT_SECRET" \
            --domain="$domain" --plain --silent)"
          VERDACCIO_TOKEN="$("$infisical_bin" secrets get VERDACCIO_TOKEN \
            --token="$INFISICAL_TOKEN" --projectId=952c94fb-3c39-4384-8087-2e459812bc3d \
            --env=prod --path=/custd-sdk --domain="$domain" --plain --silent)"
          npm_config="$(mktemp)"
          trap 'rm -f "$npm_config"' EXIT
          chmod 600 "$npm_config"
          printf '//verdaccio.k8.haak.co/:_auth=%s\n' "$VERDACCIO_TOKEN" > "$npm_config"
          export NPM_CONFIG_USERCONFIG="$npm_config"
          cd sdk-js && npm publish --registry=https://verdaccio.k8.haak.co/ --access restricted --ignore-scripts

  publish-packagist:
    runs-on: self-hosted
    needs: [php, php-analysis, php-laravel, php-wordpress, release-guard]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Notify Packagist
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          if [ -z "$PACKAGIST_USERNAME" ] || [ -z "$PACKAGIST_TOKEN" ]; then
            echo "Packagist secrets are not configured; skipping."
            exit 0
          fi
          curl -fsS --config - <<EOF
          request = "POST"
          header = "Content-Type: application/json"
          header = "Authorization: Bearer ${PACKAGIST_USERNAME}:${PACKAGIST_TOKEN}"
          url = "https://packagist.org/api/update-package"
          data = "{\"repository\":{\"url\":\"https://github.com/haakco/custd-sdk\"}}"
          EOF
