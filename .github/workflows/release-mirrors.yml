name: Release Mirrors

# On a v* tag, split each framework/SDK subtree to its read-only mirror repo and
# copy the same tag onto it. Consumers point Composer VCS / Go modules at the
# mirrors (no Packagist). The push token is pulled from Infisical at runtime
# (Universal Auth, matching custd/cb) and passed via http.extraheader so it never
# lands in argv/process list or logs.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  split:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - prefix: laravel-package
            mirror: haakco/custd-sdk-laravel
          - prefix: wordpress-plugin
            mirror: haakco/custd-sdk-wordpress
          - prefix: sdk-go
            mirror: haakco/custd-sdk-go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          # Don't persist the checkout token as an http.extraheader — our push
          # sets its own extraheader, and two would send a duplicate
          # Authorization header (git push → HTTP 400). The repo is public, so
          # the initial fetch needs no persisted credential.
          persist-credentials: false
      - name: Install Infisical CLI
        env:
          MISE_GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL https://mise.run | sh
          "$HOME/.local/bin/mise" install infisical@0.43.84
          printf '%s\n' "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"
      - name: Guard tag == VERSION
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$version" ]; then
            echo "Release tag v$tag does not match VERSION ($version)." >&2
            exit 1
          fi
      - name: Split subtree and push to mirror
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          PREFIX: ${{ matrix.prefix }}
          MIRROR: ${{ matrix.mirror }}
          TAG: ${{ github.ref_name }}
        run: |
          domain="https://secrets.k8.haak.co/api"
          token="$(infisical login --method=universal-auth \
            --client-id="$INFISICAL_CLIENT_ID" --client-secret="$INFISICAL_CLIENT_SECRET" \
            --domain="$domain" --plain --silent)"
          push_token="$(infisical secrets get MIRROR_PUSH_TOKEN \
            --token="$token" --projectId=952c94fb-3c39-4384-8087-2e459812bc3d \
            --env=prod --path=/custd-sdk --domain="$domain" --plain --silent)"

          split_sha="$(git subtree split --prefix="$PREFIX" | tr -d '[:space:]')"

          # The Go module's tests read shared contract fixtures that live at the
          # monorepo root, outside the sdk-go prefix. Vendor them into the split
          # (pure plumbing — no working-tree mutation) so the standalone
          # custd-sdk-go module is self-contained.
          if [ "$PREFIX" = "sdk-go" ]; then
            tmp_index="$(mktemp)"
            GIT_INDEX_FILE="$tmp_index" git read-tree "$split_sha"
            for f in $(git ls-files contract-fixtures); do
              blob="$(git hash-object -w "$f")"
              GIT_INDEX_FILE="$tmp_index" git update-index --add --cacheinfo "100644,$blob,$f"
            done
            new_tree="$(GIT_INDEX_FILE="$tmp_index" git write-tree)"
            # Pin the commit's dates to the split commit's date so the injection is
            # byte-for-byte reproducible: same source tag -> same commit SHA. Without
            # this, commit-tree stamps "now" and every run yields a new SHA, so the
            # (immutable) Go module tag push is rejected on re-runs.
            src_date="$(git show -s --format=%cI "$split_sha")"
            split_sha="$(GIT_AUTHOR_NAME=custd-sdk-ci GIT_AUTHOR_EMAIL=ci@haak.co \
              GIT_COMMITTER_NAME=custd-sdk-ci GIT_COMMITTER_EMAIL=ci@haak.co \
              GIT_AUTHOR_DATE="$src_date" GIT_COMMITTER_DATE="$src_date" \
              git commit-tree "$new_tree" -p "$split_sha" \
              -m 'chore: vendor contract-fixtures for standalone module')"
            rm -f "$tmp_index"
          fi

          auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$push_token" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=$auth_header" \
            push "https://github.com/${MIRROR}.git" "${split_sha}:refs/heads/main" --force
          git -c "http.https://github.com/.extraheader=$auth_header" \
            push "https://github.com/${MIRROR}.git" "${split_sha}:refs/tags/${TAG}"
